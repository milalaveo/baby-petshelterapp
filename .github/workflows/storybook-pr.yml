name: Storybook PR Build

on:
  pull_request:
    paths:
      - '.github/workflows/storybook-pr.yml'
      - 'baby-petshelter/**'

jobs:
  build-storybook:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    env:
      CHROMATIC_PROJECT_TOKEN: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
    defaults:
      run:
        working-directory: baby-petshelter

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: baby-petshelter/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build Storybook
        run: npm run build-storybook

      - name: Publish to Chromatic
        id: chromatic
        if: ${{ env.CHROMATIC_PROJECT_TOKEN != '' }}
        uses: chromaui/action@latest
        with:
          workingDir: baby-petshelter
          projectToken: ${{ env.CHROMATIC_PROJECT_TOKEN }}
          storybookBuildDir: baby-petshelter/storybook-static
          exitZeroOnChanges: true
          onlyChanged: true

      - name: Comment Chromatic link on PR
        if: ${{ steps.chromatic.outcome == 'success' && steps.chromatic.outputs.storybookUrl != '' }}
        uses: actions/github-script@v7
        with:
          script: |
            const marker = '<!-- chromatic-preview-link -->';
            const body = `${marker}
            Chromatic preview: ${'${{ steps.chromatic.outputs.storybookUrl }}'}
            Build details: ${'${{ steps.chromatic.outputs.buildUrl }}'}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const existing = comments.find((comment) => comment.body?.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }
